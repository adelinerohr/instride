name: Deploy Encore Backend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-encore-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Encore
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - name: Authenticate Encore
        run: encore auth login --auth-key="${{ secrets.ENCORE_AUTH_KEY }}"

      - name: Deploy
        working-directory: apps/backend
        run: encore deploy --env=prod --commit="${{ github.sha }}"